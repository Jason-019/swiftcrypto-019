<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwiftCrypto">
<link rel="icon" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="manifest" href="./manifest.webmanifest">
<title>🔐 SwiftCrypto</title>
<style>
:root{
    --bg:#0a0a0f;--card:rgba(20,20,40,0.8);--accent:#a78bfa;--accent2:#7c3aed;
    --text:#e2e0e7;--dim:#8888a0;--border:rgba(255,255,255,0.07);--r:14px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,'PingFang SC',system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;color-scheme:dark;transition:background 0.5s;
    position:relative;
}
body::before{
    content:'';position:fixed;inset:0;background:#000;
    pointer-events:none;z-index:-1;opacity:0;transition:opacity 0.4s;
}
.topbar{
    display:flex;align-items:center;gap:8px;padding:10px 12px;
    background:rgba(10,10,20,0.9);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);
}
.topbar h1{font-size:1rem;font-weight:700;flex:1;
    background:linear-gradient(135deg,var(--accent),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar .badge{font-size:0.65rem;color:var(--dim);border:1px solid var(--border);border-radius:6px;padding:2px 6px;}
.icon-btn{
    width:34px;height:34px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.08);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--text);font-size:1rem;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.icon-btn:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2)}
.icon-btn:active{background:var(--accent2)}
.pwd-row{display:flex;gap:6px;padding:10px 12px;align-items:center;}
.pwd-row input{
    flex:1;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--border);
    background:rgba(255,255,255,0.04);color:var(--text);font-size:0.9rem;outline:none;min-width:0;
}
.pwd-row input:focus{border-color:var(--accent)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin:0 12px}
.tab{
    flex:1;text-align:center;padding:10px;font-size:0.85rem;font-weight:600;
    color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;display:flex;flex-direction:column;padding:10px 12px;gap:10px;overflow-y:auto}
.panel{display:none;flex-direction:column;gap:8px;flex:1}
.panel.active{display:flex}
textarea{
    flex:1;min-height:140px;padding:12px;border-radius:var(--rs);border:1px solid var(--border);
    background:rgba(0,0,0,0.25);color:var(--text);font-size:0.9rem;line-height:1.55;
    resize:none;outline:none;font-family:inherit;
}
textarea:focus{border-color:var(--accent)}
textarea[readonly]{background:rgba(0,0,0,0.15)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn{
    padding:10px 16px;border-radius:var(--rs);border:none;font-size:0.82rem;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;
}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;flex:1;justify-content:center}
.btn-primary:active{opacity:.85}
.btn-copy{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn-outline{background:rgba(255,255,255,0.06);color:#aaa;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn-outline:hover{background:rgba(255,255,255,0.1);color:#ccc;border-color:rgba(255,255,255,0.18)}
.char-count{font-size:0.7rem;color:var(--dim);text-align:right}
#lyricModal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);
    backdrop-filter:blur(4px);justify-content:flex-end;align-items:stretch}
#lyricModal.show{display:flex}
#lyricModal .sheet{
    background:rgba(20,20,45,0.98);border-radius:16px 16px 0 0;padding:16px;
    max-height:75vh;width:100%;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
}
#lyricModal .sheet h3{font-size:1rem;text-align:center}
#lyricModal select{
    padding:10px;border-radius:var(--rs);border:1px solid var(--border);
    background:rgba(255,255,255,0.05);color:var(--text);font-size:0.85rem;outline:none;color-scheme:dark;
}
#lyricModal select:disabled{opacity:.35}
/* 自定义下拉替换原生 select */
.lyric-custom-select {
    position:relative;
}
.lyric-custom-select .lcs-trigger {
    width:100%;padding:10px;border-radius:var(--rs);border:1px solid var(--border);
    background:rgba(255,255,255,0.05);color:var(--dim);font-size:0.85rem;
    text-align:left;outline:none;cursor:pointer;
}
.lyric-custom-select .lcs-trigger:not(:disabled){color:var(--text)}
.lyric-custom-select .lcs-options {
    display:none;position:absolute;left:0;right:0;top:100%;
    max-height:180px;overflow-y:auto;border-radius:var(--rs);
    border:1px solid var(--border);background:rgba(20,20,45,0.98);
    z-index:10;margin-top:2px;
}
.lyric-custom-select.open .lcs-options{display:block}
.lyric-custom-select .lcs-opt {
    padding:10px 12px;cursor:pointer;font-size:0.82rem;color:var(--text);
}
.lyric-custom-select .lcs-opt:hover,.lyric-custom-select .lcs-opt:active{background:rgba(167,139,250,0.25)}
#lyricModal .preview{padding:10px;border-radius:var(--rs);background:rgba(0,0,0,0.3);border:1px solid var(--border);font-size:0.85rem;font-style:italic;line-height:1.4}
#lyricModal .modal-btns{display:flex;gap:8px}
#lyricModal .modal-btns .btn{flex:1;justify-content:center}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#10b981;
    color:#fff;padding:8px 18px;border-radius:18px;font-size:0.8rem;z-index:200;
    opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}
/* Emoji cipher mode */
.emoji-cipher{font-size:1.25rem;line-height:1.8;word-break:break-all;letter-spacing:2px;min-height:60px;max-height:180px;overflow-y:auto;padding:12px;border-radius:var(--rs);background:rgba(0,0,0,0.25);border:1px solid var(--border);user-select:all;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.15) transparent}
.emoji-cipher::-webkit-scrollbar{width:8px}
.emoji-cipher::-webkit-scrollbar-track{background:transparent}
.emoji-cipher::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}
/* Share modal */
#shareModal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);justify-content:center;align-items:flex-end}
#shareModal.show{display:flex}
#shareModal .sheet{background:rgba(20,20,45,0.98);border-radius:16px 16px 0 0;padding:16px;width:100%;max-height:70vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;
    scrollbar-width:auto;scrollbar-color:rgba(255,255,255,0.3) transparent}
#shareModal .sheet::-webkit-scrollbar{width:20px}
#shareModal .sheet::-webkit-scrollbar-track{background:transparent}
#shareModal .sheet::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.22);border-radius:10px;border:4px solid transparent;background-clip:content-box}
#shareModal .sheet::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.4);background-clip:content-box}
#shareModal .sheet h3{font-size:1rem;text-align:center}
#shareModal input{width:100%;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.8rem;outline:none}
#shareModal .modal-btns{display:flex;flex-direction:column;gap:10px}
#shareModal .modal-btns .btn-row{display:flex;gap:8px}
#shareModal .modal-btns .btn-row .btn{flex:1;justify-content:center}
#shareLink{word-break:break-all;font-size:0.65rem;color:var(--accent);background:rgba(0,0,0,0.3);padding:10px;border-radius:var(--rs);border:1px solid var(--border);max-height:100px;overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.25) transparent}
#shareLink::-webkit-scrollbar{width:16px}
#shareLink::-webkit-scrollbar-track{background:transparent}
#shareLink::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:8px;border:3px solid transparent;background-clip:content-box}
/* Chat mode */
.chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 0;min-height:200px;max-height:50vh}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:0.85rem;line-height:1.45;animation:msgIn .3s ease;word-break:break-word;position:relative}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border-bottom-right-radius:4px}
.chat-msg.them{align-self:flex-start;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-msg .meta{font-size:0.6rem;opacity:.6;margin-bottom:3px;display:flex;justify-content:space-between;gap:8px}
.chat-msg .cipher-preview{font-size:0.6rem;opacity:.45;margin-top:4px;font-family:monospace;word-break:break-all;max-height:24px;overflow:hidden}
.chat-input-row{display:flex;gap:6px;align-items:flex-end}
.chat-input-row textarea{flex:1;min-height:44px;max-height:80px;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:rgba(0,0,0,0.25);color:var(--text);font-size:0.85rem;resize:none;outline:none;font-family:inherit}
.chat-input-row textarea:focus{border-color:var(--accent)}
.chat-actions{display:flex;gap:6px;padding:4px 0}
.empty-chat{text-align:center;color:var(--dim);font-size:0.8rem;padding:30px 0}
/* Password strength */
.pwd-strength{height:3px;border-radius:2px;margin:0 12px;background:rgba(255,255,255,0.06);overflow:hidden;transition:all .3s}
.pwd-strength div{height:100%;transition:width .4s,background .4s;width:0}
.pwd-label{font-size:0.6rem;text-align:right;padding:2px 12px 0;min-height:14px}
/* Incognito toggle */
.incog-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:0.65rem}
.incog-toggle input{display:none}
.incog-toggle .switch{width:32px;height:18px;border-radius:9px;background:rgba(255,255,255,0.15);position:relative;transition:background .3s}
.incog-toggle .switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .3s}
.incog-toggle input:checked+.switch{background:#ef4444}
.incog-toggle input:checked+.switch::after{left:16px}
/* Self-destruct */
.sd-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:0.72rem}
.sd-row .sd-toggle{display:flex;align-items:center;gap:3px;cursor:pointer}
.sd-row .sd-toggle input{display:none}
.sd-row .sd-toggle .switch{width:28px;height:16px;border-radius:8px;background:rgba(255,255,255,0.12);position:relative;transition:background .3s;flex-shrink:0}
.sd-row .sd-toggle .switch::after{content:'';position:absolute;top:1.5px;left:1.5px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .3s}
.sd-row .sd-toggle input:checked+.switch{background:#f97316}
.sd-row .sd-toggle input:checked+.switch::after{left:13.5px}
.sd-row .sd-opts{display:none;align-items:center;gap:4px;flex-wrap:wrap}
.sd-row .sd-opts.show{display:flex}
.sd-row .sd-time{display:flex;align-items:center;gap:2px}
.sd-row .sd-time input{width:34px;padding:3px;border-radius:4px;border:1px solid var(--border);background:rgba(0,0,0,0.25);color:var(--text);font-size:0.7rem;text-align:center;outline:none;color-scheme:dark}
.sd-row .sd-time input:focus{border-color:var(--accent)}
.sd-badge{display:inline-block;font-size:0.55rem;background:#f97316;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.sd-countdown{font-size:0.55rem;color:#f97316;margin-left:4px}
/* Auto-paste toggle (standalone, not inside sd-row) */
.chat-auto-toggle{display:flex;align-items:center;cursor:pointer}
.chat-auto-toggle input{display:none}
.chat-auto-toggle .switch{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,0.12);position:relative;transition:background .3s;flex-shrink:0}
.chat-auto-toggle .switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .3s}
.chat-auto-toggle input:checked+.switch{background:var(--accent)}
.chat-auto-toggle input:checked+.switch::after{left:18px}
</style>
</head>
<body>

<div class="topbar">
    <h1>SwiftCrypto</h1>
    <label class="incog-toggle" title="隐身模式：不保存任何记录">
        <input type="checkbox" id="incogMode" onchange="toggleIncog()">
        <span class="switch"></span>
        <span style="color:var(--dim)">👻</span>
    </label>
    <span class="badge">AES-256</span>
</div>

<div class="pwd-row" style="flex-direction:column;gap:6px">
    <div style="display:flex;gap:6px;width:100%">
        <input type="password" id="password" placeholder="共享密码…" autocomplete="off" oninput="updatePwdStrength()" style="flex:1">
        <button class="icon-btn" id="togglePwd" onclick="togglePwd()">👁</button>
        <button class="icon-btn" onclick="clearPassword()" title="清除密码" style="color:var(--dim);font-size:0.75rem">✕</button>
    </div>
    <div style="display:flex;gap:6px;width:100%;align-items:center">
        <select id="pwdHistorySelect" onchange="usePwdFromSelect()" style="flex:1;padding:6px 8px;border-radius:var(--rs);border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--dim);font-size:0.7rem;outline:none;min-width:0;color-scheme:dark">
            <option value="">🕐 历史密码…</option>
        </select>
        <button class="icon-btn" onclick="genPwd()" title="生成随机密码" style="color:#fbbf24;flex-shrink:0">🎲</button>
        <button class="icon-btn" onclick="openLyricPicker()" title="从歌词挑选" style="color:var(--accent);flex-shrink:0">📜</button>
    </div>
</div>
<div class="pwd-strength"><div id="pwdStrengthBar"></div></div>
<div class="pwd-label" id="pwdStrengthLabel"></div>
<div id="pwdHint" style="display:none;margin:2px 12px;padding:6px 10px;border-radius:var(--rs);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);font-size:0.7rem;color:#c4b5fd">💡 <span id="pwdHintText"></span></div>

<div style="display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:0.75rem;color:var(--dim);">
    <span>🎨</span>
    <button class="icon-btn" onclick="prevTheme()" style="width:24px;height:24px;font-size:0.65rem;flex-shrink:0">◀</button>
    <span id="themeName" style="flex:1;min-width:0;text-align:center;font-size:0.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">1989</span>
    <button class="icon-btn" onclick="nextTheme()" style="width:24px;height:24px;font-size:0.65rem;flex-shrink:0">▶</button>
    <span style="flex-shrink:0">🌓</span>
    <input type="range" id="bgOpacity" min="0" max="100" value="75" oninput="updateBgOpacity(this.value)" style="width:60px;flex-shrink:0;accent-color:var(--accent);">
    <span id="bgOpacityVal" style="width:32px;text-align:right;flex-shrink:0;font-size:0.7rem">75%</span>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('enc')">🔒 加密</div>
    <div class="tab" onclick="switchTab('dec')">🔓 解密</div>
    <div class="tab" onclick="switchTab('chat')">💬 密聊</div>
    <div class="tab" onclick="switchTab('midi')">🎵 MIDI</div>
</div>

<div class="content">
    <div class="panel active" id="panelEnc">
        <textarea id="plainInput" placeholder="输入明文…"></textarea>
        <div class="sd-row">
            <label class="sd-toggle" title="🔥 定时焚毁">
                <input type="checkbox" id="sdEnabled" onchange="toggleSD()">
                <span class="switch"></span> <span style="color:var(--dim)">🔥 定时焚毁</span>
            </label>
            <span class="sd-opts" id="sdOpts">
                <span class="sd-time">
                    <input type="number" id="sdH" min="0" max="71" value="0" onchange="clampSD()"> <span style="font-size:0.65rem;color:var(--dim)">时</span>
                    <input type="number" id="sdM" min="0" max="59" value="0" onchange="clampSD()"> <span style="font-size:0.65rem;color:var(--dim)">分</span>
                    <input type="number" id="sdS" min="0" max="59" value="10" onchange="clampSD()"> <span style="font-size:0.65rem;color:var(--dim)">秒后销毁</span>
                </span>
            </span>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="doEncrypt()">🔒 加密</button>
            <button class="btn btn-outline" onclick="clearEncrypt()">清空</button>
        </div>
        <textarea id="cipherOutput" placeholder="密文…" readonly></textarea>
        <div class="emoji-cipher" id="emojiCipher" style="display:none"></div>
        <div class="btn-row">
            <button class="btn btn-copy" onclick="copyText('cipherOutput')">📋 复制密文</button>
            <button class="btn btn-outline" id="emojiToggle" onclick="toggleEmojiMode()">🎭 Emoji</button>
            <button class="btn btn-outline" onclick="shareCipher()">📤 快捷分享</button>
            <button class="btn btn-outline" onclick="openShareModal()">🔗 链接</button>
        </div>
        <div class="char-count" id="cipherCount">密文: 0 字</div>
    </div>
    <div class="panel" id="panelDec">
        <textarea id="cipherInput" placeholder="粘贴密文…"></textarea>
        <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:0.6rem;color:var(--dim)">🎨 或上传Era色块图:</span>
            <input type="file" id="eraFileInput" accept="image/*" onchange="decodeEraGrid()" style="flex:1;font-size:0.6rem;color:var(--dim)">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="doDecrypt()">🔓 解密</button>
            <button class="btn btn-outline" onclick="clearDecrypt()">清空</button>
        </div>
        <textarea id="plainOutput" placeholder="明文…" readonly></textarea>
        <div class="btn-row">
            <button class="btn btn-copy" onclick="copyText('plainOutput')">📋 复制明文</button>
        </div>
        <div class="char-count" id="plainCount">明文: 0 字</div>
    </div>
    <div class="panel" id="panelChat">
        <div style="display:flex;align-items:center;gap:6px;padding:0 0 4px 0">
            <span style="font-size:0.65rem;color:var(--dim)">📱</span>
            <input id="deviceName" placeholder="设备名" onchange="saveDeviceName()" style="flex:1;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:0.7rem;outline:none;max-width:80px">
            <code id="deviceIdLabel" style="font-size:0.6rem;color:var(--dim);background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px"></code>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">🔐 输入共享密码后开始密聊…<br><small>双方使用相同密码即可加密对话</small></div>
        </div>
        <div class="chat-input-row">
            <textarea id="chatInput" placeholder="输入消息…" rows="1"></textarea>
            <button class="btn btn-primary" onclick="chatSend()" style="flex:none">🔒 发送</button>
        </div>
        <div id="chatCipherRow" style="display:none;margin-top:2px">
            <div style="display:flex;gap:4px;align-items:center">
                <code id="chatCipherText" style="flex:1;font-size:0.6rem;color:var(--accent);word-break:break-all;background:rgba(0,0,0,0.25);padding:5px 8px;border-radius:6px;max-height:30px;overflow:hidden"></code>
                <button class="btn btn-copy" onclick="copyChatCipher()" style="flex:none;padding:4px 8px;font-size:0.65rem">📋</button>
                <button class="btn btn-outline" onclick="shareChatCipher()" style="flex:none;padding:4px 6px;font-size:0.6rem">📤</button>
                <button class="btn btn-outline" id="chatEmojiToggle" onclick="toggleChatEmoji()" style="flex:none;padding:4px 6px;font-size:0.6rem">🎭</button>
            </div>
        </div>
        <div class="chat-input-row" style="margin-top:6px">

<script>
// Crypto
const NS=12,KS=256,IT=600000,ST=new TextEncoder().encode('SCMobile_v1');
async function dk(p){const m=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:ST,iterations:IT,hash:'SHA-256'},m,{name:'AES-GCM',length:KS},false,['encrypt','decrypt'])}
async function doEncrypt(){
    let p=document.getElementById('plainInput').value;if(!p)return t('请输入明文');
    const sdm=getSDMeta();if(sdm)p=sdm+p;
    try{const k=await dk(gp()),n=crypto.getRandomValues(new Uint8Array(NS)),c=await crypto.subtle.encrypt({name:'AES-GCM',iv:n},k,new TextEncoder().encode(p)),m=new Uint8Array(n.length+c.byteLength);m.set(n);m.set(new Uint8Array(c),n.length);document.getElementById('cipherOutput').value=btoa(String.fromCharCode(...m));uc();updateEmojiDisplay();autoSavePwd();t(sdm?'🔥 定时焚毁密文已生成 ('+fmtRemaining(getSDRemainFromMeta(sdm))+')':'✅ 加密完成')}catch(e){t('❌ '+e.message)}
}
async function doDecrypt(){
    let b=document.getElementById('cipherInput').value.trim();if(!b)return t('请输入密文');
    if(isEmojiCipher(b)){b=emojiToCipher(b);document.getElementById('cipherInput').value=b;t('🎭 已识别Emoji密文')}
    stopDecryptCountdown();
    try{const k=await dk(gp()),r=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),p=await crypto.subtle.decrypt({name:'AES-GCM',iv:r.slice(0,NS)},k,r.slice(NS));let pt=new TextDecoder().decode(p);
        const sd=checkSelfDestruct(pt);
        if(!sd.valid){document.getElementById('plainOutput').value=sd.message;uc();t('🔥 '+sd.message);return}
        typewriterOutput('plainOutput',sd.message,()=>{
            if(sd.wasSD)startDecryptCountdown(sd.expiry,sd.message);
        });
        uc();autoSavePwd();t(sd.wasSD?'🔥 解密成功，剩余 '+fmtRemaining(sd.remaining)+' 后焚毁':'✅ 解密成功')}catch(e){t(e.name==='OperationError'?'❌ 密码错误':'❌ '+e.message)}
}
function gp(){return document.getElementById('password').value}
// ---- ⌨️ Typewriter effect for decryption ----
let _twTimer=null;
function typewriterOutput(textareaId,text,done){
    if(_twTimer)clearInterval(_twTimer);
    const ta=document.getElementById(textareaId),full=text;
    ta.value='';let i=0;
    _twTimer=setInterval(()=>{
        ta.value=full.slice(0,++i);
        ta.scrollTop=ta.scrollHeight;
        if(i>=full.length){clearInterval(_twTimer);_twTimer=null;if(done)done();}
    },25);
}
// ---- 🔥 SD real-time countdown ----
let _sdCD={expiry:0,timer:null,msg:''};
function startDecryptCountdown(expiry,msg){
    _sdCD={expiry,msg,timer:setInterval(()=>{
        const r=expiry-Date.now();
        const po=document.getElementById('plainOutput');
        if(r<=0){po.value='💨 此消息已过期焚毁';uc();stopDecryptCountdown();t('🔥 消息已焚毁');return}
        po.value=msg+'\n\n⏳ 剩余 '+fmtRemaining(r)+' 后焚毁';
    },500)};
}
function stopDecryptCountdown(){
    if(_sdCD.timer){clearInterval(_sdCD.timer);_sdCD={expiry:0,timer:null,msg:''};}
}
// ---- 🔥 Self-destruct (timer-based, 30s ~ 71h59m59s) ----
function toggleSD(){
    const on=document.getElementById('sdEnabled').checked;
    document.getElementById('sdOpts').classList.toggle('show',on);
}
function clampSD(){
    let h=parseInt(document.getElementById('sdH').value)||0;
    let m=parseInt(document.getElementById('sdM').value)||0;
    let s=parseInt(document.getElementById('sdS').value)||0;
    const origH=h,origM=m,origS=s;
    if(m<0)m=0;if(m>59)m=59;
    if(s<0)s=0;if(s>59)s=59;
    if(h<0)h=0;if(h>71)h=71;
    const total=h*3600+m*60+s;
    if(total<10){h=0;m=0;s=10;} // minimum 10s
    if(total>259199){h=71;m=59;s=59;} // max 71h59m59s
    if(h===71&&m===59&&s>59)s=59;
    document.getElementById('sdH').value=h;
    document.getElementById('sdM').value=m;
    document.getElementById('sdS').value=s;
    // Show toast if clamped
    if(origH!==h||origM!==m||origS!==s){
        const origFmt=(origH?origH+'时':'')+(origM?origM+'分':'')+origS+'秒';
        const clampFmt=(h?h+'时':'')+(m?m+'分':'')+s+'秒';
        t('⏱ 焚毁时间已从 '+origFmt+' 调整为 '+clampFmt+'（范围10秒~71时59分59秒）');
    }
}
function getSDMeta(){
    if(!document.getElementById('sdEnabled').checked)return '';
    clampSD();
    const h=parseInt(document.getElementById('sdH').value);const H=isNaN(h)?0:h;
    const m=parseInt(document.getElementById('sdM').value);const M=isNaN(m)?0:m;
    const s=parseInt(document.getElementById('sdS').value);const S=isNaN(s)?0:s;
    const exp=Date.now()+(H*3600+M*60+S)*1000;
    return '🔥'+exp+'|';
}
function fmtRemaining(ms){
    // Format remaining time nicely
    if(ms<=0)return '已过期';
    const t=Math.floor(ms/1000);
    if(t<60)return t+'秒';
    if(t<3600)return Math.floor(t/60)+'分'+ (t%60?t%60+'秒':'');
    return Math.floor(t/3600)+'小时'+ (t%3600>=60?Math.floor((t%3600)/60)+'分':'');
}
function getSDRemainFromMeta(sdm){const m=sdm.match(/^🔥(\d+)\|/);return m?parseInt(m[1])-Date.now():0;}
// ---- Chat SD live countdown watchdog ----
let _chatSDTimer=null;
function startChatSDWatch(){
    if(_chatSDTimer)return;
    _chatSDTimer=setInterval(()=>{
        let changed=false;
        const now=Date.now();
        for(const m of chatMsgs){
            if(!m.sdExpiry||m.expired)continue;
            if(now>=m.sdExpiry){m.text='💨 此消息已过期焚毁';m.expired=true;m.sdExpiry=0;changed=true;}
        }
        if(changed){saveChat();renderChat();}
        // Update visible countdowns without full re-render
        document.querySelectorAll('.sd-countdown').forEach(el=>{
            const exp=parseInt(el.dataset.exp);
            const r=exp-now;
            if(r<=0){el.textContent='💨已焚毁';el.style.color='#ef4444';}
            else el.textContent='⏳'+fmtRemaining(r);
        });
        // Stop timer if no active SD messages
        if(!chatMsgs.some(m=>m.sdExpiry&&!m.expired))stopChatSDWatch();
    },500);
}
function stopChatSDWatch(){if(_chatSDTimer){clearInterval(_chatSDTimer);_chatSDTimer=null;}}
function checkSelfDestruct(pt){
    // Returns {valid, message, wasSD, remaining, expiry}
    const m=pt.match(/^🔥(\d+)\|/);
    if(!m)return {valid:true,message:pt,wasSD:false,remaining:0,expiry:0};
    const exp=parseInt(m[1]),msg=pt.slice(m[0].length);
    const remain=exp-Date.now();
    if(remain<=0)return {valid:false,message:'💨 此消息已过期焚毁',wasSD:true,remaining:0,expiry:exp};
    return {valid:true,message:msg,wasSD:true,remaining:remain,expiry:exp};
}
// ---- 📊 Password strength meter (entropy-based) ----
function updatePwdStrength(){
    const p=gp(),bar=document.getElementById('pwdStrengthBar'),lbl=document.getElementById('pwdStrengthLabel');
    if(!p){bar.style.width='0';lbl.textContent='';return}

    // 1. Count distinct chars per category -> effective pool size
    const low=p.match(/[a-z]/g)||[], up=p.match(/[A-Z]/g)||[];
    const dig=p.match(/[0-9]/g)||[], sp=p.match(/[^A-Za-z0-9]/g)||[];
    const distLow=new Set(low).size, distUp=new Set(up).size;
    const distDig=new Set(dig).size, distSp=new Set(sp).size;
    const poolSize=Math.max(distLow+distUp+distDig+distSp,2);

    // 2. Base Shannon entropy: log2(pool) × length
    let entropy=Math.log2(poolSize)*p.length;

    // 3. Penalty multipliers (1.0 = no penalty)
    let penalty=1.0;

    // --- Repeat penalty: 3+ identical chars in a row
    const repeats=p.match(/(.)\1\1+/g)||[];
    for(const r of repeats) penalty-=Math.min(r.length*0.04,0.15);
    if(/(.)\1\1\1\1/.test(p)) penalty-=0.1; // 5+ same char

    // --- Sequential penalty: abc, 123, cba, 987 etc
    let seqHits=0;
    const pl=p.toLowerCase();
    for(let i=0;i<pl.length-2;i++){
        const a=pl.charCodeAt(i),b=pl.charCodeAt(i+1),c=pl.charCodeAt(i+2);
        if(Math.abs(a-b)===1&&Math.abs(b-c)===1&&a-b===b-c) seqHits++;
    }
    penalty-=Math.min(seqHits*0.06,0.25);

    // --- Keyboard walk penalty
    const kBrd=['qwertyuiop','asdfghjkl','zxcvbnm','1234567890','qwertzuiop','azertyuiop'];
    for(const row of kBrd){
        for(let i=0;i<row.length-2;i++){
            const seg=row.substring(i,i+3), rev=seg.split('').reverse().join('');
            if(pl.includes(seg)||pl.includes(rev)){penalty-=0.08;break;}
        }
    }

    // --- Single-class penalty
    const classes=[low.length>0,up.length>0,dig.length>0,sp.length>0].filter(Boolean).length;
    if(classes===1) penalty-=0.35;
    else if(classes===2&&p.length<10) penalty-=0.12;

    // --- Common dictionary / pattern penalty (graded)
    const dict=['password','admin','user','login','qwerty','abc123','123456','letmein',
        'monkey','dragon','master','welcome','sunshine','princess','football','iloveyou',
        'trustno1','12345678','123456789','000000','111111','secret','changeme',
        'passw0rd','p@ssword','p@ssw0rd','admin123','root','guest','test'];
    for(const w of dict){
        if(pl===w){penalty-=0.5;break;}              // exact case-insensitive match
        if(pl.startsWith(w)||pl.endsWith(w)){penalty-=0.28;break;} // prefix/suffix
        if(pl.includes(w)){penalty-=0.18;break;}     // substring
    }

    // --- Short password penalty (exponential)
    if(p.length<8) penalty-=Math.pow(8-p.length,1.5)*0.06;
    if(p.length<5) penalty-=0.2;

    // --- Date/year suffix penalty
    if(/(19|20)\d{2}$/.test(p)) penalty-=0.15;
    if(/(123|1234|12345|!+|@+|#+)$/.test(p)) penalty-=0.08;

    // --- Leet-speak penalty (simple substitution patterns)
    const leetPat=/[pP][@4][s5\$][s5\$][wW][0o][rR][dD]/;
    if(leetPat.test(p)) penalty-=0.35;

    penalty=Math.max(penalty,0.05);
    entropy*=penalty;

    // 4. Map entropy to 6 levels
    // With PBKDF2-600K, even ~40 bits is quite decent
    const thresholds=[18,28,40,54,70,90];
    let lvl=thresholds.findIndex(t=>entropy<t);
    if(lvl<0) lvl=5;

    const levels=[
        {w:'12%',c:'#ef4444',t:'🔓 纸糊的锁 — 秒破'},
        {w:'28%',c:'#f97316',t:'🔐 聊胜于无 — 分钟级'},
        {w:'48%',c:'#eab308',t:'🔑 还行 — 小时级'},
        {w:'66%',c:'#22c55e',t:'🔒 靠谱 — 数月级'},
        {w:'84%',c:'#10b981',t:'🛡️ 很强 — 年级'},
        {w:'100%',c:'#a78bfa',t:'🔮 量子来了也得算几年'}
    ];
    const lv=levels[lvl];
    bar.style.width=lv.w;bar.style.background=lv.c;
    lbl.textContent=lv.t+' ('+Math.round(entropy)+' bits)';
    lbl.style.color=lv.c;
}
// ---- 👻 Incognito mode ----

function handleIncomingShare(){
    const params=new URLSearchParams(location.search);
    // ── PWA Share Target: 微信分享 .mid 文件 ──
    if(params.get('shared')==='1'){
        switchTab('midi');
        setTimeout(async ()=>{
            try{
                const resp=await fetch('/_shared_midi');
                if(!resp.ok)return;
                const name=resp.headers.get('X-Shared-File')||'shared.mid';

async function handlePastedMidi(){
    try{
        const items=await navigator.clipboard.read();
        for(const item of items){
            for(const type of item.types){
                if(type==='audio/midi'||type==='application/octet-stream'||type.includes('midi')){
                    const blob=await item.getType(type);
                    const name='pasted_'+Date.now()+'.mid';
                    const file=new File([blob],name,{type:'audio/midi'});
                    const dt=new DataTransfer();dt.items.add(file);
                    document.getElementById('midiFileInput').files=dt.files;
                    t('📋 已粘贴 .mid 文件');
                    midiDecodeFromFile();
                    return;
                }
            }
        }
        t('⚠️ 剪贴板中未找到 .mid 文件');
    }catch(e){t('⚠️ 无法读取剪贴板: '+e.message)}
}

// ========== 🎭 Emoji 密文模式 ==========
const B64='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
const EMOJI_MAP=['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶'];
const REV_EMOJI={};for(let i=0;i<64;i++)REV_EMOJI[EMOJI_MAP[i]]=B64[i];
let emojiMode=false;
function cipherToEmoji(b64){let r='';for(const c of b64){const i=B64.indexOf(c);r+=i>=0?EMOJI_MAP[i]:c}return r}
function emojiToCipher(emo){let r='';for(const c of emo){r+=REV_EMOJI[c]||c}return r}
function isEmojiCipher(text){for(const c of text){if(REV_EMOJI[c])return true}return false}
function autoConvertEmoji(text){return isEmojiCipher(text)?emojiToCipher(text):text}
function toggleEmojiMode(){
    emojiMode=!emojiMode;
    const ta=document.getElementById('cipherOutput'),ec=document.getElementById('emojiCipher');
    const btn=document.getElementById('emojiToggle');
    if(emojiMode){
        const b64=ta.value;if(!b64)return t('⚠️ 请先生成密文');
        ec.textContent=cipherToEmoji(b64);ta.style.display='none';ec.style.display='block';
        btn.textContent='🔤 文本';btn.style.color='#fbbf24';
    }else{
        ta.style.display='';ec.style.display='none';btn.textContent='🎭 Emoji';btn.style.color='';
    }
}
function updateEmojiDisplay(){
    if(emojiMode){
        const b64=document.getElementById('cipherOutput').value;
        document.getElementById('emojiCipher').textContent=b64?cipherToEmoji(b64):'';
    }
}

function buildShareUrl(){
    const b64=document.getElementById('cipherOutput').value;
    if(!b64)return '';
    const hint=document.getElementById('shareHint').value.trim()||'';
    const base=location.origin==='null'||location.protocol==='file:'?location.href.split('#')[0]:location.origin+location.pathname;
    return base+'#c='+encodeURIComponent(b64)+(hint?'&h='+encodeURIComponent(hint):'');
}

        const sdBadge=m.sd&&!m.sdExpiry?'<span class="sd-badge">🔥</span>':'';
        const expStyle=m.expired?'opacity:0.5;font-style:italic':'';
        const cp=m.cipher?`<div class="cipher-preview" onclick="copyChatMsgCipher('${eh(m.cipher)}')" title="点击复制完整密文" style="cursor:pointer">🔐 ${eh(m.cipher.slice(0,40))}…</div>`:'';
        return `<div class="chat-msg ${cls}" style="${expStyle}"><div class="meta"><span>${label}${devLabel}${sdBadge}${sdRemain}</span><span>${time}</span></div><div>${eh(m.text)}</div>${cp}</div>`;

}
async function chatSend(){

async function chatReceive(){
    let b64=document.getElementById('chatRecvInput').value.trim();
    if(!b64)return t('请先粘贴对方的密文');
    if(isEmojiCipher(b64)){b64=emojiToCipher(b64);document.getElementById('chatRecvInput').value=b64;t('🎭 已识别Emoji密文')}
    const pw=gp();if(!pw)return t('请先设置共享密码');
    try{
        const k=await dk(pw),r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
        const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:r.slice(0,NS)},k,r.slice(NS));
        const raw=new TextDecoder().decode(p);
        // Self-destruct check first
        const sd=checkSelfDestruct(raw);
        if(!sd.valid){
            chatMsgs.push({role:'them',text:sd.message,cipher:b64,time:Date.now(),device:'',senderName:'系统',expired:true});
            saveChat();renderChat();document.getElementById('chatRecvInput').value='';
            t('🔥 '+sd.message);return;
        }
        // Parse: "[发送方名字|设备ID]消息内容"
        const m2=sd.message.match(/^\[(.+?)\|(.+?)\]/);
        const senderName=m2?m2[1]:'';
        const senderId=m2?m2[2]:'未知';
        const text=m2?sd.message.slice(m2[0].length):sd.message;
        chatMsgs.push({role:'them',text,cipher:b64,time:Date.now(),device:senderId,senderName,sd:sd.wasSD,sdExpiry:sd.expiry});
        saveChat();renderChat();document.getElementById('chatRecvInput').value='';
        if(sd.wasSD)startChatSDWatch();
        autoSavePwd();t(sd.wasSD?'🔥 解密成功，剩余 '+fmtRemaining(sd.remaining)+' 后焚毁':'✅ 解密成功！');
    }catch(e){t(e.name==='OperationError'?'❌ 密码错误，对方用的密码和你不同':'❌ '+e.message)}
}

// ---- 🔧 XOR Parity ECC for Era Grid ----
function encodeParity(b64){
    // Group into blocks of 4, add XOR parity char per block (25% overhead)
    const clean=b64.replace(/=+$/,'');let out='';
    for(let i=0;i<clean.length;i+=4){
        const block=clean.slice(i,i+4);
        let xor=0;for(const c of block)xor^=B64.indexOf(c);
        out+=block+B64[xor];
    }
    return out;
}
function decodeParity(b64){
    // Decode parity: each 5-char block = 4 data + 1 parity. Try to repair single errors.
    const clean=b64.replace(/=+$/,'');if(clean.length%5!==0)return b64; // Not parity-encoded
    let out='',repaired=0;
    for(let i=0;i<clean.length;i+=5){
        const block=clean.slice(i,i+5);
        const idx=block.split('').map(c=>B64.indexOf(c));
        // Check if any char is invalid
        const invalid=idx.map((v,j)=>v<0?j:-1).filter(j=>j>=0);
        if(invalid.length>0){
            // Try to repair: compute what the invalid char should be
            let xor=0;for(let j=0;j<5;j++)if(j!==invalid[0])xor^=idx[j];
            if(xor>=0&&xor<64){idx[invalid[0]]=xor;repaired++;}
        }else{
            // All valid — check parity
            const parity=idx[0]^idx[1]^idx[2]^idx[3];
            if(parity!==idx[4]){
                // Parity mismatch — try each position
                let found=false;
                for(let tryPos=0;tryPos<5&&!found;tryPos++){
                    let xor=0;for(let j=0;j<5;j++)if(j!==tryPos)xor^=idx[j];
                    if(xor>=0&&xor<64){
                        idx[tryPos]=xor;repaired++;found=true;
                    }
                }
            }
        }
        // Output first 4 chars of the (possibly repaired) block
        for(let j=0;j<4;j++){
            const v=idx[j];
            out+=(v>=0&&v<64)?B64[v]:clean[i+j]; // Use original if repair failed
        }
    }
    if(repaired)console.log('Parity repaired '+repaired+' errors');
    return out;
}
// ---- 🎨 Era Color Grid share ----
const ERA_COLORS=['#FFD60A','#FF9500','#34C759','#007AFF','#AF52DE','#5AC8FA','#FF2D55','#8E8E93'];
const ERA_NAMES=['Gold','Fearless','Debut','1989','Speak Now','Evermore','Lover','Midnights'];
function renderEraCard(){
    let b64=document.getElementById('cipherOutput').value;
    const cv=document.getElementById('eraCardCanvas');if(!cv||!b64)return;
    b64=encodeParity(b64);
    // 追加 1 字符 XOR 校验和（2 个色块）
    let cs=0;for(const c of b64){const i=B64.indexOf(c);if(i>=0)cs^=i;}
    b64+=B64[cs&63];
    const COLS=14,CELL=20,GAP=2,PAD=8,REF_H=CELL+12;
    const cells=[];for(const c of b64){const i=B64.indexOf(c);if(i>=0){cells.push(i>>3,i&7)}}
    const rows=Math.ceil(cells.length/COLS);
    const gridW=COLS*(CELL+GAP)+GAP+PAD*2;
    const gridH=rows*(CELL+GAP)+GAP+REF_H+PAD*2;
    // 名片卡：网格 + 标题 + 日期/主题
    const cardW=gridW+40,cardH=gridH+90;
    cv.width=cardW;cv.height=cardH;
    const ctx=cv.getContext('2d');
    // 背景
    const grad=ctx.createLinearGradient(0,0,cardW,cardH);
    grad.addColorStop(0,'#1a1a2e');grad.addColorStop(0.5,'#16213e');grad.addColorStop(1,'#0f0f1a');
    ctx.fillStyle=grad;roundRect(ctx,0,0,cardW,cardH,16);ctx.fill();
    ctx.strokeStyle='rgba(167,139,250,0.4)';ctx.lineWidth=2;
    roundRect(ctx,1,1,cardW-2,cardH-2,16);ctx.stroke();
    ctx.fillStyle='#a78bfa';ctx.font='bold 16px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText('🔐 SwiftCrypto',cardW/2,26);
    // 网格纯黑底色，隔离卡片渐变
    const offsetX=Math.floor((cardW-gridW)/2),offsetY=36;
    ctx.fillStyle='#111';ctx.fillRect(offsetX,offsetY,gridW,gridH);
    // 参考色块（加大到 32x22，更容易采样）
    const refX=offsetX+PAD,refY=offsetY+PAD+4,refW=32,refH=22;
    const refGap=(gridW-PAD*2-refW*8)/7;
    for(let i=0;i<8;i++){
        ctx.fillStyle=ERA_COLORS[i];
        ctx.fillRect(refX+i*(refW+refGap),refY,refW,refH);
    }
    // 数据色块（20x20，带1px黑边增强对比）
    const dataStartY=offsetY+REF_H+PAD;
    for(let i=0;i<cells.length;i++){
        const col=i%COLS,row=Math.floor(i/COLS);
        const cx=offsetX+PAD+col*(CELL+GAP)+GAP,cy=dataStartY+row*(CELL+GAP)+GAP;
        ctx.fillStyle='#000';ctx.fillRect(cx-1,cy-1,CELL+2,CELL+2);
        ctx.fillStyle=ERA_COLORS[cells[i]];
        ctx.fillRect(cx,cy,CELL,CELL);
    }
    // 底部信息
    const now=new Date();
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px monospace';
    ctx.fillText(now.toLocaleDateString('zh-CN')+' '+now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),cardW/2,cardH-28);
    ctx.fillText('🎨 '+document.getElementById('themeName').textContent+' · Eras Cipher',cardW/2,cardH-12);
}

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function decodeEraGrid(){
    const file=document.getElementById('eraFileInput').files[0];
    if(!file)return;
    t('🔍 正在定位参考色块…');
    const img=new Image();img.onload=()=>{
        const cv=document.createElement('canvas');cv.width=img.width;cv.height=img.height;
        const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
        const W=img.width,H=img.height,COLS=14;
        // ---- Step 1: Auto-detect reference swatch row ----
        // Scan top 15% of image for 8 bright regions in a row
        let refY=-1,refXs=[],swatchW=0,swatchGap=0,leftEdge=0;
        for(let y=4;y<H*0.5&&refY<0;y++){
            const bright=[]; // runs of bright pixels
            let inBright=false,runStart=0;
            for(let x=0;x<W;x++){
                const px=ctx.getImageData(x,y,1,1).data;
                const brightPx=px[0]+px[1]+px[2]>120;
                if(brightPx&&!inBright){inBright=true;runStart=x;}
                if(!brightPx&&inBright){inBright=false;if(x-runStart>=4)bright.push({s:runStart,e:x});}
            }
            if(bright.length>=8){
                // Check if runs are equally spaced
                const spacings=[];
                for(let i=1;i<bright.length;i++)spacings.push(bright[i].s-bright[i-1].s);
                const avgSp=spacings.reduce((a,b)=>a+b,0)/spacings.length;
                const consistent=spacings.every(s=>Math.abs(s-avgSp)<avgSp*0.25);
                if(consistent){
                    refY=y;
                    refXs=bright.slice(0,8).map(b=>Math.round((b.s+b.e)/2));
                    swatchW=bright[0].e-bright[0].s;
                    swatchGap=refXs[1]-refXs[0]-swatchW;
                    leftEdge=bright[0].s;
                }
            }
        }
        if(refY<0){t('⚠️ 未找到参考色块，请确保图片完整');document.getElementById('eraFileInput').value='';return}
        // Adjust refY from top-edge to center of swatch row
        refY+=Math.floor(swatchW/2);
        // ---- Step 2: Calibrate colors from detected swatches ----
        // 数据格参数（与编码器一致: CELL=20, GAP=2）不要从参考块推导
        const CELL=20,GAP=2,cellSpacing=CELL+GAP;
        const calibratedRGB=[];
        for(let i=0;i<8;i++){
            const cx=refXs[i];let sr=0,sg=0,sb=0,n=0;
            for(let dx=-2;dx<=2;dx++)for(let dy=-2;dy<=2;dy++){
                const px=cx+dx,py=refY+dy;
                if(px>=0&&py>=0&&px<W&&py<H){const d=ctx.getImageData(px,py,1,1).data;sr+=d[0];sg+=d[1];sb+=d[2];n++;}
            }
            calibratedRGB.push([Math.round(sr/n),Math.round(sg/n),Math.round(sb/n)]);
        }
        t('📐 已定位，正在计算容差…');
        // ---- Compute adaptive thresholds from actual color distances ----
        let minPairDist=Infinity;
        for(let i=0;i<8;i++)for(let j=i+1;j<8;j++){
            const d=(calibratedRGB[i][0]-calibratedRGB[j][0])**2+(calibratedRGB[i][1]-calibratedRGB[j][1])**2+(calibratedRGB[i][2]-calibratedRGB[j][2])**2;
            if(d<minPairDist)minPairDist=d;
        }
        // Adaptive thresholds with safety floors
        const maxDist=Math.max(minPairDist*0.35,6000);
        const darkestBg=Math.min(...calibratedRGB.map(c=>c[0]+c[1]+c[2]))*0.25;
        // ---- Step 3: 数据格用固定 CELL/GAP，不从参考块大小推导 ----
        const dataStartY=refY+Math.round(swatchW/2)+6+CELL/2;
        const gridX=leftEdge;
        const sampleCell=(col,row)=>{
            const cx=gridX+GAP+col*cellSpacing+Math.floor(CELL/2);
            const cy=dataStartY+row*cellSpacing;
            if(cx<3||cy<3||cx>=W-3||cy>=H-3)return -1;
            let sr=0,sg=0,sb=0,n=0;
            for(let dx=-4;dx<=4;dx++)for(let dy=-4;dy<=4;dy++){
                const w=5-Math.abs(dx)-Math.abs(dy);if(w<=0)continue;
                const px=cx+dx,py=cy+dy;
                if(px>=0&&py>=0&&px<W&&py<H){const d=ctx.getImageData(px,py,1,1).data;sr+=d[0]*w;sg+=d[1]*w;sb+=d[2]*w;n+=w;}
            }
            if(n===0)return -1;
            const r=Math.round(sr/n),g=Math.round(sg/n),b=Math.round(sb/n);
            if(r+g+b<darkestBg)return -1;
            let bestI=0,bestD=Infinity,secondD=Infinity;
            for(let i=0;i<8;i++){
                const d=(r-calibratedRGB[i][0])**2+(g-calibratedRGB[i][1])**2+(b-calibratedRGB[i][2])**2;
                if(d<bestD){secondD=bestD;bestD=d;bestI=i}else if(d<secondD)secondD=d;
            }
            return (bestD<maxDist&&bestD*2.0<secondD)?bestI:-1;
        };
        let b64='';let emptyRows=0;
        for(let row=0;;row++){
            let matchCount=0;
            for(let col=0;col<COLS;col++){if(sampleCell(col,row)>=0)matchCount++;}
            if(matchCount===0){emptyRows++;if(emptyRows>=2)break;} // 2 consecutive empty rows = end
            else emptyRows=0;
            for(let col=0;col+1<COLS;col+=2){
                const hi=sampleCell(col,row),lo=sampleCell(col+1,row);
                if(hi>=0&&lo>=0)b64+=B64[(hi<<3)|lo];
            }
        }
        if(b64){
            // XOR parity repair
            b64=decodeParity(b64);
            // 校验和验证：最后一个字符是 XOR 校验
            if(b64.length>1){
                const csChar=b64.slice(-1),dataPart=b64.slice(0,-1);
                let cs=0;for(const c of dataPart){const i=B64.indexOf(c);if(i>=0)cs^=i;}
                if((cs&63)!==B64.indexOf(csChar)){
                    t('⚠️ 校验和不匹配，可能有误读，请重新截图');
                    document.getElementById('eraFileInput').value='';return;
                }
                b64=dataPart;
            }
            // Restore base64 padding
            while(b64.length%4)b64+='=';
            document.getElementById('cipherInput').value=b64;uc();
            document.getElementById('eraFileInput').value='';
            t('✅ 解码成功！'+b64.length+' 字符');
            const pw=gp();if(pw){doDecrypt()}
        }else{t('⚠️ 未识别到数据色块');document.getElementById('eraFileInput').value=''}
    };
    img.src=URL.createObjectURL(file);
}

            <button class="btn btn-primary" id="midiConfirmBtn" onclick="confirmMidiPick()" disabled style="flex:1;justify-content:center">🎹 确认</button>
        </div>
    </div>
</div>

</body>
</html>
